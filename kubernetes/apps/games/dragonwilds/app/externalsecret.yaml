---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dragonwilds
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: dragonwilds-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        DISCORD_WEBHOOK_URL: "{{ .DISCORD_WEBHOOK_URL }}"
  dataFrom:
    - extract:
        key: dragonwilds
