---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: windrose
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: windrose-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        SERVER_PASSWORD: "{{ .SERVER_PASSWORD }}"
  dataFrom:
    - extract:
        key: windrose
