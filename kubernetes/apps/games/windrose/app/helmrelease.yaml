---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app windrose
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 4711
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    controllers:
      windrose:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: mornedhels/windrose-server
              tag: 0.1.0-proton@sha256:cb777e7a20d945c2cf71cf3e41b02155ce278211d793401e44de64a06faa244c
            env:
              TZ: ${TIMEZONE}
              PUID: "4711"
              PGID: "4711"
              SERVER_NAME: Confetti-Cannon
              SERVER_MAX_PLAYER_COUNT: "8"
              SERVER_USE_DIRECT_CONNECTION: "true"
              SERVER_DIRECT_CONNECTION_SERVER_PORT: &gameport 7779
              SERVER_DIRECT_CONNECTION_PROXY_ADDRESS: "0.0.0.0"
            envFrom:
              - secretRef:
                  name: windrose-secret
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
            resources:
              requests:
                cpu: 500m
                memory: 4Gi
              limits:
                memory: 8Gi
    service:
      app:
        controller: *app
        type: LoadBalancer
        annotations:
          io.cilium/lb-ipam-ips: 10.10.40.149
        ports:
          gameport:
            enabled: true
            port: *gameport
            protocol: UDP
          gameport-tcp:
            enabled: true
            port: *gameport
            protocol: TCP
    persistence:
      data:
        enabled: true
        existingClaim: *app
        globalMounts:
          - path: /opt/windrose
