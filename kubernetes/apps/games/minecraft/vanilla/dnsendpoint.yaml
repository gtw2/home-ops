---
# yaml-language-server: $schema=https://kubernetes-schemas.ok8.sh/externaldns.k8s.io/dnsendpoint_v1alpha1.json
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: vanilla
spec:
  endpoints:
    - dnsName: "vanilla.${SECRET_GAMING_DOMAIN}"
      recordType: CNAME
      targets: ["mc.${SECRET_GAMING_DOMAIN}"]
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: 'false'
    - dnsName: "_minecraft._tcp.vanilla.${SECRET_GAMING_DOMAIN}"
      recordType: SRV
      targets: ["0 5 25565 ipv4.${SECRET_GAMING_DOMAIN}"]
    # Creative subdomain — players use this to wake the creative backend.
    # /server VanillaCreative from inside Velocity won't trigger mc-router's
    # scale-up (Velocity dials backend directly), so a public hostname is the
    # only way to scale-from-zero into creative mode.
    - dnsName: "vanilla-creative.${SECRET_GAMING_DOMAIN}"
      recordType: CNAME
      targets: ["mc.${SECRET_GAMING_DOMAIN}"]
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: 'false'
    - dnsName: "_minecraft._tcp.vanilla-creative.${SECRET_GAMING_DOMAIN}"
      recordType: SRV
      targets: ["0 5 25565 ipv4.${SECRET_GAMING_DOMAIN}"]
