---
# DNS aliases so Velocity can reach mc-router with a distinct hostname per backend.
# - vanilla         → routes to minecraft-vanilla pods            (survival)
# - vanilla-creative→ routes to minecraft-vanilla-creative pods   (creative copy)
# mc-router uses the handshake hostname (this Service's FQDN) to pick the route;
# the target Service is the HR-rendered one (`minecraft-vanilla[-creative]`),
# whose `mc-router.itzg.me/externalServerName` annotation matches that hostname.
apiVersion: v1
kind: Service
metadata:
  name: vanilla
spec:
  type: ExternalName
  externalName: minecraft-router.games.svc.cluster.local
---
apiVersion: v1
kind: Service
metadata:
  name: vanilla-creative
spec:
  type: ExternalName
  externalName: minecraft-router.games.svc.cluster.local
