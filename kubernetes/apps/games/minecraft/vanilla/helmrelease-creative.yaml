---
# Creative copy of the vanilla world.
# - Scaled 0→1 by mc-router on /server VanillaCreative; back to 0 after 30m idle.
# - World is a CoW clone of the vanilla PVC, refreshed via `task minecraft:refresh-creative SOURCE=vanilla`.
# - Mods + version + image MUST match the survival HR — the cloned world is version-locked.
#   When updating vanilla, mirror the changes here.
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app minecraft-vanilla-creative
spec:
  interval: 15m
  timeout: 5m
  maxHistory: 3
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    controllers:
      minecraft-vanilla-creative:
        # mc-router only knows how to scale StatefulSets, and requires
        # metadata.name == spec.serviceName to fire the scale-up.
        type: statefulset
        statefulset:
          serviceName: minecraft-vanilla-creative
        replicas: 0
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            # Keep in lock-step with vanilla/helmrelease.yaml
            image:
              repository: ghcr.io/itzg/minecraft-server
              tag: 2026.5.2@sha256:5476619d049f4c0e2764532b345da1db4c154b4294bcc16d9c3b8d5f4b0d9923
            tty: true
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  periodSeconds: 60
                  exec: &mc-health { command: ["mc-health"] }
              readiness: *probes
              startup:
                <<: *probes
                spec:
                  initialDelaySeconds: 60
                  periodSeconds: 1
                  failureThreshold: 300
                  exec: *mc-health
            env:
              EULA: "true"
              TZ: "${TIMEZONE}"
              TYPE: FABRIC
              MAX_TICK_TIME: "-1"
              # === MUST MATCH vanilla survival ===
              VERSION: 1.21.11
              SEED: "722314537282636262"
              LEVEL: "vanilla"
              # === Creative-mode overrides (the only intentional divergence from survival) ===
              MOTD: "Vanilla — Creative Copy"
              MODE: "creative"
              FORCE_GAMEMODE: "true"
              DIFFICULTY: "peaceful"
              PVP: "false"
              # Distinct LuckPerms context from survival vanilla
              CFG_LUCKPERMS_SERVER: "vanilla-creative"
              # === Same as survival ===
              OVERRIDE_SERVER_PROPERTIES: "true"
              SPAWN_PROTECTION: 0
              FORCE_REDOWNLOAD: "true"
              ONLINE_MODE: "false"
              ALLOW_FLIGHT: "true"
              REPLACE_ENV_IN_PLACE: "true"
              ENABLE_ROLLING_LOGS: "false"
              LOG_TIMESTAMP: "true"
              JVM_XX_OPTS: -XX:MaxRAMPercentage=75
              MAX_MEMORY: 4096M
              USE_AIKAR_FLAGS: "true"
              SNOOPER_ENABLED: "false"
              VIEW_DISTANCE: 14
              REMOVE_OLD_MODS: "true"
              MODRINTH_DEFAULT_VERSION_TYPE: release
              # Must match vanilla's mod list so the cloned world loads cleanly
              MODRINTH_PROJECTS: |-
                fabric-api
                luckperms:OrIs0S6b
                worldedit
                krypton
                ferrite-core
                fabricproxy-lite
                lithium
                simple-voice-chat
                vanilla-permissions
              ENABLE_QUERY: "true"
              EXISTING_OPS_FILE: SYNCHRONIZE
            envFrom:
              # Reuse the survival Secret — RCON password, ops list, postgres creds,
              # forwarding secret are all identical for the creative copy.
              - secretRef:
                  name: minecraft-vanilla-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: [ALL]
                add: ["NET_RAW"]
            resources:
              requests:
                cpu: 200m
                memory: 2Gi
              limits:
                memory: 4Gi
    service:
      minecraft:
        controller: *app
        type: ClusterIP
        annotations:
          # See vanilla/helmrelease.yaml for why both names are listed.
          mc-router.itzg.me/externalServerName: "vanilla-creative.games.svc.cluster.local,vanilla-creative.${SECRET_GAMING_DOMAIN}"
        ports:
          java:
            port: 25565
            protocol: TCP
          rcon:
            port: 25575
    persistence:
      data:
        # Created/refreshed via `task minecraft:refresh-creative SOURCE=vanilla`
        existingClaim: minecraft-vanilla-creative
      # Reuse vanilla's configMap so mod configs stay in sync automatically
      config:
        enabled: true
        type: configMap
        name: minecraft-vanilla-configmap
        globalMounts:
          - subPath: luckperms.conf
            path: /config/luckperms/luckperms.conf
          - subPath: fabricproxy.toml
            path: /config/FabricProxy-Lite.toml
