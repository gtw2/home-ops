---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/grafana.integreatly.org/grafanadashboard_v1beta1.json
# FabricExporter dashboard — covers the Fabric survival server and (via the
# same metric set) the creative copy. Backed by the fabricexporter:D7LrQrIU
# mod pinned in vanilla/helmrelease.yaml and helmrelease-creative.yaml.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: minecraft-fabricexporter
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS
  url: https://grafana.com/api/dashboards/14492/revisions/5/download
