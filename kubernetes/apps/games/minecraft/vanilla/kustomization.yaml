---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./dnsendpoint.yaml
  - ./externalsecret.yaml
  - ./helmrelease.yaml             # survival
  - ./helmrelease-creative.yaml    # creative copy (scale-from-zero clone of survival world)
  - ./route-services.yaml          # ExternalName aliases pointing Velocity at mc-router
configMapGenerator:
  - name: minecraft-vanilla-configmap
    files:
      - luckperms.conf=./config/luckperms.conf
      - fabricproxy.toml=./config/fabricproxy.toml
generatorOptions:
  disableNameSuffixHash: true
