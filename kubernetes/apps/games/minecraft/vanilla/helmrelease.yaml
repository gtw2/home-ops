# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app minecraft-vanilla
spec:
  interval: 15m
  timeout: 5m
  maxHistory: 3
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    controllers:
      minecraft-vanilla:
        # Scaled 0→1 by mc-router on /server Vanilla; back to 0 after 30m idle.
        # mc-router only knows how to scale StatefulSets, and requires
        # metadata.name == spec.serviceName to fire the scale-up.
        type: statefulset
        statefulset:
          serviceName: minecraft-vanilla
        replicas: 0
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/itzg/minecraft-server
              tag: 2026.6.0@sha256:775492ff9a85243383ac15fc2d3c311569c63cfe624e9c1c99b9a5c1c1585972
            tty: true
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  periodSeconds: 60
                  exec: &mc-health { command: ["mc-health"] }
              readiness: *probes
              startup:
                <<: *probes
                spec:
                  initialDelaySeconds: 60
                  periodSeconds: 1
                  failureThreshold: 300
                  exec: *mc-health
            env:
              # Server Configuration
              ## General
              EULA: "true"
              TZ: "${TIMEZONE}"
              TYPE: FABRIC
              ENABLE_AUTOPAUSE: FALSE
              MAX_TICK_TIME: "-1"
              # renovate: depName=minecraft datasource=custom.minecraft versioning=semver-coerced
              VERSION: 1.21.11
              OVERRIDE_SERVER_PROPERTIES: "true"
              MOTD: "Our long term persistent vanilla server"
              DIFFICULTY: normal
              SEED: "722314537282636262"
              LEVEL: "vanilla"
              MODE: "survival"
              # LuckPerms server-context identifier. Substituted into luckperms.conf
              # at startup by itzg's sync-and-interpolate (CFG_ prefix). Distinct value
              # per HR so creative copies don't share permission contexts with survival.
              CFG_LUCKPERMS_SERVER: "vanilla"
              SPAWN_PROTECTION: 0
              FORCE_REDOWNLOAD: "true"
              ONLINE_MODE: "false"
              ALLOW_FLIGHT: "true"
              REPLACE_ENV_IN_PLACE: "true"
              # Logging
              ENABLE_ROLLING_LOGS: "false"
              LOG_TIMESTAMP: "true"
              # Performance
              JVM_XX_OPTS: -XX:MaxRAMPercentage=75
              MAX_MEMORY: 6144M
              USE_AIKAR_FLAGS: "true"
              SNOOPER_ENABLED: "false"
              VIEW_DISTANCE: 14
              ## Mods
              REMOVE_OLD_MODS: "true"
              MODRINTH_DEFAULT_VERSION_TYPE: release
              # fabricexporter:D7LrQrIU is FabricExporter 1.0.20 — explicit MC
              # 1.21.11 support, no kotlin dependency. Listens on 25585 by
              # default (matches the metrics Service port below). UnifiedMetrics
              # has no Fabric build for 1.21.x; FabricExporter is the active
              # alternative. NB: comments inside the |- block are parsed as
              # project slugs by itzg — keep them out of the block.
              MODRINTH_PROJECTS: |-
                fabric-api
                luckperms:OrIs0S6b
                worldedit
                krypton
                ferrite-core
                fabricproxy-lite
                lithium
                simple-voice-chat
                fabricexporter:D7LrQrIU
                vanilla-permissions
              # VANILLATWEAKS_SHARECODE: 4miIMt # Coord HUD, Anti-Endermen Griefing for 1.20
              ENABLE_QUERY: "true"
              EXISTING_OPS_FILE: SYNCHRONIZE
            envFrom:
              - secretRef:
                  name: minecraft-vanilla-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: [ALL]
                add: ["NET_RAW"]
            resources:
              requests:
                cpu: 300m
                memory: 3Gi
              limits:
                memory: 6Gi
    service:
      minecraft:
        controller: *app
        type: ClusterIP
        annotations:
          # Hostname mc-router watches for in the player's handshake. When a player connects
          # to this hostname, mc-router scales this Service's backing StatefulSet 0→1.
          mc-router.itzg.me/externalServerName: "vanilla.${SECRET_GAMING_DOMAIN}"
          # Where mc-router actually routes the client connection. Velocity then handles
          # /server hopping and player-info-forwarding to the (now-running) backend directly.
          # This preserves modern forwarding (mc-router is NOT in the Velocity↔backend path).
          mc-router.itzg.me/proxyServerName: "minecraft-velocity.games.svc.cluster.local:25565"
        ports:
          java:
            port: 25565
            protocol: TCP
          voice:
            port: 24454
            protocol: UDP
          bedrock:
            port: 19132
            protocol: UDP
          rcon:
            port: 25575
          metrics:
            # FabricExporter listens on 25585 by default.
            port: 25585
    serviceMonitor:
      metrics:
        enabled: true
        serviceName: *app
        endpoints:
          - port: metrics
            scheme: http
            path: /
            interval: 1m
    persistence:
      data:
        existingClaim: *app
      config:
        enabled: true
        type: configMap
        name: minecraft-vanilla-configmap
        globalMounts:
          - subPath: luckperms.conf
            path: /config/luckperms/luckperms.conf
          - subPath: fabricproxy.toml
            path: /config/FabricProxy-Lite.toml
