---
# Creative copy of the create-mod world.
# - Scaled 0→1 by mc-router on /server CreateCreative; back to 0 after 30m idle.
# - World is a CoW clone of the create PVC, refreshed via `task minecraft:refresh-creative SOURCE=create`.
# - Mods + version + image MUST match the survival HR — the cloned world is version-locked.
#   When updating create, mirror the changes here.
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app minecraft-create-creative
spec:
  interval: 15m
  timeout: 5m
  maxHistory: 3
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    controllers:
      minecraft-create-creative:
        # mc-router only knows how to scale StatefulSets, and requires
        # metadata.name == spec.serviceName to fire the scale-up.
        type: statefulset
        statefulset:
          serviceName: minecraft-create-creative
        replicas: 0
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            # Keep in lock-step with create/helmrelease.yaml
            image:
              repository: ghcr.io/itzg/minecraft-server
              tag: 2026.6.0@sha256:775492ff9a85243383ac15fc2d3c311569c63cfe624e9c1c99b9a5c1c1585972
            tty: true
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  periodSeconds: 60
                  exec: &mc-health { command: ["mc-health"] }
              readiness: *probes
              startup:
                <<: *probes
                spec:
                  initialDelaySeconds: 60
                  periodSeconds: 1
                  failureThreshold: 300
                  exec: *mc-health
            env:
              EULA: "true"
              TZ: "${TIMEZONE}"
              TYPE: AUTO_CURSEFORGE
              # Keep loader in lock-step with create/helmrelease.yaml — the
              # cloned world is version-locked. See that file for why the
              # force-reinstall is needed.
              CF_MOD_LOADER_VERSION: 21.1.230
              CF_FORCE_REINSTALL_MODLOADER: "true"
              MAX_TICK_TIME: "-1"
              # === MUST MATCH create survival ===
              VERSION: 1.21.1
              SEED: "-3306902169669489505"
              LEVEL: "just-create-smp-2"
              # === Creative-mode overrides ===
              MOTD: "Create — Creative Copy"
              MODE: "creative"
              FORCE_GAMEMODE: "true"
              DIFFICULTY: "peaceful"
              PVP: "false"
              # Distinct LuckPerms context from survival create
              CFG_LUCKPERMS_SERVER: "create-creative"
              # === Same as survival ===
              SPAWN_PROTECTION: 0
              FORCE_REDOWNLOAD: "true"
              ONLINE_MODE: "false"
              ALLOW_FLIGHT: "true"
              REPLACE_ENV_IN_PLACE: "true"
              ENABLE_ROLLING_LOGS: "false"
              LOG_TIMESTAMP: "true"
              JVM_XX_OPTS: -XX:MaxRAMPercentage=75
              MAX_MEMORY: 6144M
              USE_AIKAR_FLAGS: "true"
              SNOOPER_ENABLED: "false"
              VIEW_DISTANCE: 14
              # Must match create's mod list exactly so the cloned world loads
              CF_SLUG: just-create-smp-2
              MODRINTH_DEFAULT_VERSION_TYPE: release
              MODRINTH_PROJECTS: |-
                luckperms:dKAPoPGd
                proxy-compatible-forge
                sleep
                worldedit
              CURSEFORGE_FILES: |-
                ftb-xmod-compat
              ENABLE_QUERY: "true"
              EXISTING_OPS_FILE: SYNCHRONIZE
            envFrom:
              - secretRef:
                  name: minecraft-create-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: [ALL]
                add: ["NET_RAW"]
            resources:
              requests:
                cpu: 300m
                memory: 3Gi
              limits:
                memory: 6Gi
    service:
      minecraft:
        controller: *app
        type: ClusterIP
        annotations:
          # See vanilla/helmrelease.yaml for the annotation contract.
          mc-router.itzg.me/externalServerName: "create-creative.${SECRET_GAMING_DOMAIN}"
          mc-router.itzg.me/proxyServerName: "minecraft-velocity.games.svc.cluster.local:25565"
        ports:
          java:
            port: 25565
            protocol: TCP
          rcon:
            port: 25575
    persistence:
      data:
        existingClaim: minecraft-create-creative
      config:
        enabled: true
        type: configMap
        name: minecraft-create-configmap
        globalMounts:
          - subPath: luckperms.conf
            path: /config/luckperms/luckperms.conf
          - subPath: pcf-common.toml
            path: /config/proxy-compatible-forge.toml
          - subPath: create.toml
            path: /config/create-server.toml
