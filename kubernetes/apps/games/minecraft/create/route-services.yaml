---
# DNS aliases so Velocity can reach mc-router with a distinct hostname per backend.
# - create         → routes to minecraft-create pods           (survival)
# - create-creative→ routes to minecraft-create-creative pods  (creative copy)
apiVersion: v1
kind: Service
metadata:
  name: create
spec:
  type: ExternalName
  externalName: minecraft-router.games.svc.cluster.local
---
apiVersion: v1
kind: Service
metadata:
  name: create-creative
spec:
  type: ExternalName
  externalName: minecraft-router.games.svc.cluster.local
