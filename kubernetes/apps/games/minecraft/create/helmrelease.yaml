# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app minecraft-create
spec:
  interval: 15m
  timeout: 5m
  maxHistory: 3
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    controllers:
      minecraft-create:
        # Kept always-on (replicas: 1). NeoForge clients refuse to handshake
        # with any limbo that doesn't speak NeoForge protocol, and running a
        # NeoForge limbo would mean booting the whole modpack a second time
        # for the waiting-room — at that point it's cheaper to just leave the
        # real server running. Cold-start scale-from-zero remains in use for
        # the creative variant, which is touched rarely enough that the
        # connection-refused window is acceptable.
        # StatefulSet kept (not Deployment) so mc-router can still manage it
        # if we re-enable scale-to-zero later; mc-router requires
        # metadata.name == spec.serviceName for scale-up to fire.
        type: statefulset
        statefulset:
          serviceName: minecraft-create
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/itzg/minecraft-server
              tag: 2026.5.4@sha256:f364bae78a0027aee72b01b9b532b1ae0990b3ee8cadbb6a3bc25db77418a25f
            tty: true
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  periodSeconds: 60
                  exec: &mc-health { command: ["mc-health"] }
              readiness: *probes
              startup:
                <<: *probes
                spec:
                  initialDelaySeconds: 60
                  periodSeconds: 1
                  failureThreshold: 300
                  exec: *mc-health
            env:
              # Server Configuration
              ## General
              EULA: "true"
              TZ: "${TIMEZONE}"
              TYPE: AUTO_CURSEFORGE
              CF_MOD_LOADER_VERSION: 21.1.233
              # The NeoForge loader is cached on the /data PVC, so once a loader
              # is installed AUTO_CURSEFORGE reuses it and silently ignores
              # CF_MOD_LOADER_VERSION. Force a reinstall so the pinned 21.1.230
              # actually replaces the modpack-declared 21.1.222. Can be dropped
              # back to "false" once the volume has the correct loader.
              CF_FORCE_REINSTALL_MODLOADER: "true"
              CF_OVERRIDES_SKIP_EXISTING: "true"
              # Hard-exclude the world path from override handling entirely.
              CF_OVERRIDES_EXCLUSIONS: |-
                just-create-smp-2/**
              # Pin the modpack so it never jumps versions unattended. Use the exact
              # file id (best) or a filename matcher. Bump this deliberately when you
              # actually want to update — and back up first.
              CF_FILE_ID: "<id-of-the-version-you-want>"   # or: CF_FILENAME_MATCHER: "1.0.2hotfix"
              # ENABLE_AUTOPAUSE: TRUE
              MAX_TICK_TIME: "-1"
              # USES_PLUGINS: "true"
              # MC version + loader are resolved from the modpack manifest;
              # left here as fallback / for renovate to pin against.
              # renovate: depName=minecraft datasource=custom.minecraft versioning=semver-coerced
              VERSION: 1.21.1
              MOTD: "Our seasonal Create mod server"
              DIFFICULTY: normal
              SEED: "-3306902169669489505"
              LEVEL: "just-create-smp-2"
              MODE: "survival"
              # LuckPerms server-context identifier. Substituted into luckperms.conf
              # at startup by itzg's sync-and-interpolate (CFG_ prefix).
              CFG_LUCKPERMS_SERVER: "create"
              SPAWN_PROTECTION: 0
              FORCE_REDOWNLOAD: "true"
              ONLINE_MODE: "false"
              ALLOW_FLIGHT: "true"
              REPLACE_ENV_IN_PLACE: "true"
              # Logging
              ENABLE_ROLLING_LOGS: "false"
              LOG_TIMESTAMP: "true"
              # Performance
              JVM_XX_OPTS: -XX:MaxRAMPercentage=75
              MAX_MEMORY: 8192M
              USE_AIKAR_FLAGS: "true"
              SNOOPER_ENABLED: "false"
              VIEW_DISTANCE: 14
              ## Mods
              # Base mod set comes from the Just Create SMP 2 modpack via
              # AUTO_CURSEFORGE — itzg resolves the manifest, downloads every
              # included mod, and replaces them when the modpack version bumps.
              REMOVE_OLD_MODS: "true"
              CF_SLUG: just-create-smp-2
              #CF_FILENAME_MATCHER: 1.0.1
              CF_EXCLUDE_MODS: |-
                foxys
              MODRINTH_DEFAULT_VERSION_TYPE: release
              MODRINTH_PROJECTS: |-
                create-aeronautics
                luckperms:dKAPoPGd
                proxy-compatible-forge
                sable
                sleep
                worldedit
              CURSEFORGE_FILES: |-
                ftb-xmod-compat
              # PLUGINS: |-
              #   https://cdn.modrinth.com/data/7IbzD4Zm/versions/JZpRIpOD/SignedVelocity-Sponge-10-1.3.0.jar
              # PLUGINS_OUT_DIR: /data/mods/plugins
              # https://vanillatweaks.net/share#NpW9a6
              # VANILLATWEAKS_SHARECODE: NpW9a6 # Anti-Endermen Griefing for 1.21
              ENABLE_QUERY: "true"
              EXISTING_OPS_FILE: SYNCHRONIZE
            envFrom:
              - secretRef:
                  name: minecraft-create-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: [ALL]
                add: ["NET_RAW"]
            resources:
              requests:
                cpu: 300m
                memory: 4Gi
              limits:
                memory: 8Gi
    service:
      minecraft:
        controller: *app
        type: ClusterIP
        # annotations:
        #   # See vanilla/helmrelease.yaml for the annotation contract.
        #   mc-router.itzg.me/externalServerName: "create.${SECRET_GAMING_DOMAIN}"
        #   mc-router.itzg.me/proxyServerName: "minecraft-velocity.games.svc.cluster.local:25565"
        ports:
          java:
            port: 25565
            protocol: TCP
          voice:
            port: 24454
            protocol: UDP
          bedrock:
            port: 19132
            protocol: UDP
          rcon:
            port: 25575
          metrics:
            port: 25585
    serviceMonitor:
      metrics:
        # No Prometheus exporter mod is available for NeoForge 1.21.1 today —
        # UnifiedMetrics supports Velocity/Paper/Fabric only, and the wider
        # Modrinth ecosystem has no NeoForge-compatible scrape exporter for
        # this MC version. Leave disabled until one ships; the port + endpoint
        # scaffolding stays so it's a one-line flip once that changes.
        enabled: false
        serviceName: *app
        endpoints:
          - port: metrics
            scheme: http
            path: /
            interval: 1m
    persistence:
      data:
        existingClaim: *app
      config:
        enabled: true
        type: configMap
        name: minecraft-create-configmap
        globalMounts:
          - subPath: luckperms.conf
            path: /config/luckperms/luckperms.conf
          - subPath: pcf-common.toml
            path: /config/proxy-compatible-forge.toml
          - subPath: create.toml
            path: /config/create-server.toml
