---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/grafana.integreatly.org/grafanadashboard_v1beta1.json
# UnifiedMetrics dashboard — single dashboard covers both the Velocity proxy
# and the Paper-based Lobby. Backed by the unifiedmetrics:Dubg3nLw (Velocity)
# and unifiedmetrics:Ypqt7eH1 (Paper) plugins pinned in the respective HRs.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: minecraft-unifiedmetrics
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS
  url: https://grafana.com/api/dashboards/14756/revisions/11/download
