---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app minecraft-velocity
spec:
  interval: 10m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      strategy: rollback
    cleanupOnFail: true
  uninstall:
    keepHistory: false
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    controllers:
      velocity:
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4
            envFrom: &envFrom
              - secretRef:
                  name: minecraft-velocity-secret
        containers:
          app:
            nameOverride: *app
            image:
              repository: itzg/mc-proxy
              # Bumped to java25 because miniplaceholders' latest release is compiled for
              # class file v69 (Java 25). On java21, every status ping crashes MiniMOTD's
              # ProxyPingEvent handler with UnsupportedClassVersionError → clients see
              # "Network Protocol Error" in the server list.
              tag: java25@sha256:2709b52bbc8503f92aa02e18355bf994fb0f630456f2bbcf844cec12410e6ad5
            tty: true
            env:
              TZ: ${TIMEZONE}
              UID: "1000"
              GID: "1000"
              TYPE: VELOCITY
              # TODO renovate
              MINECRAFT_VERSION: 1.21.11
              VELOCITY_VERSION: "3.5.0-SNAPSHOT"
              #VELOCITY_BUILD_ID: 539
              OVERRIDE_ICON: "true"
              # PLUGINS_FILE: /config/plugins.txt
              INIT_MEMORY: 128M
              MAX_MEMORY: 256M
              # https://docs.papermc.io/velocity/getting-started#launching-velocity-under-macos-or-linux
              JVM_XX_OPTS: "-XX:+UseG1GC -XX:G1HeapRegionSize=4M -XX:+UnlockExperimentalVMOptions -XX:+ParallelRefProcEnabled -XX:+AlwaysPreTouch -XX:MaxInlineLevel=15"
              # Raises Velocity's known-packs cap so it can decode the configuration-phase
              # registry sync from heavily-modded NeoForge backends (Create + JCS2 has ~71
              # mods). Without this, Velocity throws "Invalid payload REGISTER!" /
              # "packet did not decode successfully" in ClientConfigSessionHandler and
              # disconnects the player. Formula from proxy-compatible-forge docs:
              # 64 + (mod_count * 1.5), rounded up; 192 leaves headroom for ~85 mods.
              # NB: itzg/mc-proxy uses JVM_OPTS for -D system props (it has no JVM_DD_OPTS,
              # unlike itzg/minecraft-server).
              JVM_OPTS: "-Dvelocity.max-known-packs=192"
              ENABLE_RCON: "false"
              REPLACE_ENV_VARIABLES: "TRUE"
              REMOVE_OLD_MODS: "true"
              MODRINTH_DEFAULT_VERSION_TYPE: release
              # unifiedmetrics:Dubg3nLw is UnifiedMetrics 0.3.8 (Apr 2023), the
              # latest release on Modrinth — not tagged for MC 1.21.x. Pinning
              # the version ID bypasses itzg's game-version filter; Velocity
              # plugins are decoupled from MC version internals, so 0.3.8 still
              # loads cleanly on 1.21.11. NB: comments inside the |- block
              # scalar are treated as project slugs by itzg, so keep them out.
              MODRINTH_PROJECTS: |-
                mckotlin
                minimotd
                miniplaceholders
                papiproxybridge:EoZAMV65
                simple-voice-chat:jMopHMDQ
                unifiedmetrics:Dubg3nLw
                velocitab:alpha
                velocity-limbo-handler
                viabackwards
                viaversion
                vlobby
                vpacketevents
              PLUGINS: |-
                https://github.com/FeuSalamander/Vmessage/releases/download/1.6.2/Vmessage.jar
                https://download.luckperms.net/1624/velocity/LuckPerms-Velocity-5.5.36.jar
            envFrom: *envFrom
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
            probes:
              readiness: &probes
                enabled: true
                type: TCP
                port: 25565
              liveness: *probes
              startup:
                <<: *probes
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              requests:
                cpu: 250m
                memory: 250Mi
              # limits:
              #   cpu: 500m
              #   memory: 1Gi

    service:
      # TCP 25565 is reached only via mc-router (at the edge LB). Keeping this as
      # ClusterIP avoids a port conflict with mc-router on the shared LB IP and
      # ensures clients can't bypass mc-router's scale-up logic by connecting to
      # Velocity directly.
      velocity:
        controller: velocity
        type: ClusterIP
        ports:
          velocity-proxy:
            port: 25565
            protocol: TCP
      # UDP voice + bedrock have to reach Velocity directly because mc-router is
      # TCP-only. Sharing the LB IP with mc-router (different protocol/port tuples)
      # via the Cilium sharing-key keeps a single public IP for the whole stack.
      udp:
        controller: velocity
        type: LoadBalancer
        annotations:
          io.cilium/lb-ipam-ips: 10.10.40.150
          io.cilium/lb-ipam-sharing-key: minecraft-frontend
        ports:
          voice-proxy:
            port: 25577
            protocol: UDP
          bedrock-proxy:
            port: 19132
            protocol: UDP
      rcon:
        controller: velocity
        ports:
          rcon:
            port: 25575
            protocol: TCP
            # targetPort: rcon
      metrics:
        controller: velocity
        ports:
          metrics:
            port: 9100
            protocol: TCP
            # targetPort: metrics

    serviceMonitor:
      metrics:
        # UnifiedMetrics (in MODRINTH_PROJECTS) exposes Prometheus on port 9100
        # by default; matches the `metrics` Service port below.
        enabled: true
        serviceName: minecraft-velocity-metrics
        endpoints:
          - port: metrics
            scheme: http
            path: /
            interval: 1m

    persistence:
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
      data:
        enabled: true
        existingClaim: *app
        globalMounts:
          - path: /server
      config:
        type: configMap
        name: minecraft-velocity-config
        globalMounts:
          - path: /config/velocity.toml
            subPath: velocity.toml
            readOnly: true
          - path: /config/plugins/luckperms/config.yml
            subPath: luckperms.yaml
            readOnly: true
          - path: /config/plugins/voicechat/voicechat-proxy.properties
            subPath: voice.conf
            readOnly: true
          - path: /config/plugins/velocitab/tab_groups.yml
            subPath: velocitab.yaml
            readOnly: true
          - path: /config/plugins/vmessage/config.toml
            subPath: vmessage.toml
            readOnly: true
          - path: /config/plugins/vlobby/configuration.conf
            subPath: vlobby.conf
            readOnly: true
          - path: /config/plugins/velocity-limbo-handler/config.yml
            subPath: vlh.yaml
            readOnly: true
          - path: /config/plugins/minimotd-velocity/extra-configs/create.conf
            subPath: config-create.conf
            readOnly: true
          - path: /config/plugins/minimotd-velocity/extra-configs/vanilla.conf
            subPath: config-vanilla.conf
            readOnly: true
          - path: /config/plugins/minimotd-velocityextra-configs/creative.conf
            subPath: config-creative.conf
            readOnly: true
          - path: /config/plugins/minimotd-velocity/main.conf
            subPath: minimotd.conf
            readOnly: true
          - path: /config/plugins/minimotd-velocity/plugin_settings.conf
            subPath: minimotd-settings.conf
            readOnly: true
      forwarding-secret:
        type: secret
        name: minecraft-velocity-secret
        items:
          - key: VELOCITY_FORWARDING_SECRET
            path: forwarding.secret
        globalMounts:
          - path: /config/forwarding.secret
            subPath: forwarding.secret
            readOnly: true
