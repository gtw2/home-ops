---
# yaml-language-server: $schema=https://kubernetes-schemas.ok8.sh/externaldns.k8s.io/dnsendpoint_v1alpha1.json
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: velocity
spec:
  endpoints:
    - dnsName: "mc.${SECRET_DOMAIN}"
      recordType: CNAME
      targets: ["ipv4.${SECRET_DOMAIN}"]
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: 'false'
    - dnsName: "mc.${SECRET_GAMING_DOMAIN}"
      recordType: CNAME
      targets: ["ipv4.${SECRET_GAMING_DOMAIN}"]
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: 'false'
    - dnsName: "_minecraft._tcp.mc.${SECRET_GAMING_DOMAIN}"
      recordType: SRV
      targets: ["0 5 25565 ipv4.${SECRET_GAMING_DOMAIN}"]
