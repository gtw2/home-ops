---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minecraft-vanilla-creative
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: minecraft-vanilla-creative-secret
    template:
      data:
        # Distinct RCON password from vanilla so creative refresh tasks target the right pod
        RCON_PASSWORD: "{{ .VANILLA_RCON_PASSWORD }}"
        OPS: "{{ .MINECRAFT_MODS }}"

        # Config Secrets (mirrors vanilla so the shared configMap renders the same)
        CFG_POSTGRES_DBNAME: minecraft
        CFG_POSTGRES_HOST: postgres17-rw.database.svc.cluster.local
        CFG_POSTGRES_USER: "{{ .MINECRAFT_POSTGRES_USER }}"
        CFG_POSTGRES_PASS: "{{ .MINECRAFT_POSTGRES_PASS }}"
        CFG_FORWARDING_SECRET: "{{ .FORWARDING_SECRET }}"
  dataFrom:
    - extract:
        key: minecraft
