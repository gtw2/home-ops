---
# Creative copy of the vanilla world. Scaled to 0 by default; mc-router wakes it on connect.
# World is a CoW clone of the vanilla PVC, refreshed via `task minecraft:refresh-creative SOURCE=vanilla`.
# Mods/version MUST match the source — the cloned world data assumes the same mod set is loaded.
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app minecraft-vanilla-creative
spec:
  interval: 15m
  timeout: 5m
  maxHistory: 3
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    controllers:
      minecraft-vanilla-creative:
        # Scaled by mc-router on demand (--auto-scale-up). Start at 0.
        replicas: 0
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/itzg/minecraft-server
              tag: 2026.5.0@sha256:fbbcfc47bc1239b57deb655162e950bd22c87df8034a2251d1f906eb2c8d3da4
            tty: true
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  periodSeconds: 60
                  exec: &mc-health { command: ["mc-health"] }
              readiness: *probes
              startup:
                <<: *probes
                spec:
                  initialDelaySeconds: 60
                  periodSeconds: 1
                  failureThreshold: 300
                  exec: *mc-health
            env:
              EULA: "true"
              TZ: "${TIMEZONE}"
              TYPE: FABRIC
              MAX_TICK_TIME: "-1"
              # Must match vanilla (cloned world data is version-locked)
              VERSION: 1.21.11
              OVERRIDE_SERVER_PROPERTIES: "true"
              MOTD: "Vanilla — Creative Copy"
              # Creative-mode overrides
              MODE: "creative"
              FORCE_GAMEMODE: "true"
              DIFFICULTY: "peaceful"
              PVP: "false"
              SPAWN_PROTECTION: 0
              LEVEL: "vanilla"
              SEED: "722314537282636262"
              FORCE_REDOWNLOAD: "true"
              # Behind Velocity (modern forwarding via fabricproxy-lite); Velocity does auth
              ONLINE_MODE: "false"
              ALLOW_FLIGHT: "true"
              REPLACE_ENV_IN_PLACE: "true"
              ENABLE_ROLLING_LOGS: "false"
              LOG_TIMESTAMP: "true"
              JVM_XX_OPTS: -XX:MaxRAMPercentage=75
              MAX_MEMORY: 4096M
              USE_AIKAR_FLAGS: "true"
              SNOOPER_ENABLED: "false"
              VIEW_DISTANCE: 14
              REMOVE_OLD_MODS: "true"
              MODRINTH_DEFAULT_VERSION_TYPE: release
              # Must match vanilla's mod list so the cloned world loads cleanly
              MODRINTH_PROJECTS: |-
                fabric-api
                luckperms:OrIs0S6b
                worldedit
                krypton
                ferrite-core
                fabricproxy-lite
                lithium
                simple-voice-chat
                vanilla-permissions
              ENABLE_QUERY: "true"
              EXISTING_OPS_FILE: SYNCHRONIZE
            envFrom:
              - secretRef:
                  name: minecraft-vanilla-creative-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: [ALL]
                add: ["NET_RAW"]
            resources:
              requests:
                cpu: 200m
                memory: 2Gi
              limits:
                memory: 4Gi
    service:
      minecraft:
        controller: *app
        type: ClusterIP
        annotations:
          # mc-router matches this against the handshake hostname from Velocity.
          # Velocity reaches mc-router via the ExternalName Service `vanilla-creative`,
          # which CNAMEs to minecraft-router but preserves this hostname in the handshake.
          mc-router.itzg.me/externalServerName: "vanilla-creative.games.svc.cluster.local"
        ports:
          java:
            port: 25565
            protocol: TCP
          rcon:
            port: 25575
    persistence:
      data:
        # Created/refreshed out-of-band by `task minecraft:refresh-creative SOURCE=vanilla`
        existingClaim: minecraft-vanilla-creative
      # Reuse vanilla's configMap so mod configs stay in sync automatically
      config:
        enabled: true
        type: configMap
        name: minecraft-vanilla-configmap
        globalMounts:
          - subPath: luckperms.conf
            path: /config/luckperms/luckperms.conf
          - subPath: fabricproxy.toml
            path: /config/FabricProxy-Lite.toml
