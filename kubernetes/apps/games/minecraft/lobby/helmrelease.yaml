# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app minecraft-lobby
spec:
  interval: 15m
  timeout: 5m
  maxHistory: 3
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    controllers:
      minecraft-lobby:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/itzg/minecraft-server
              tag: 2026.5.2@sha256:5476619d049f4c0e2764532b345da1db4c154b4294bcc16d9c3b8d5f4b0d9923
            tty: true
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  periodSeconds: 60
                  exec: &mc-health { command: ["mc-health"] }
              readiness: *probes
              startup:
                <<: *probes
                spec:
                  initialDelaySeconds: 60
                  periodSeconds: 1
                  failureThreshold: 300
                  exec: *mc-health
            env:
              # Server Configuration
              ## General
              EULA: "true"
              TZ: "${TIMEZONE}"
              TYPE: PAPER
              # ENABLE_AUTOPAUSE: TRUE
              # renovate: depName=minecraft datasource=custom.minecraft versioning=semver-coerced
              VERSION: 1.21.11
              MOTD: "Lobby server"
              DIFFICULTY: normal
              SEED: "flat"
              LEVEL: "hub"
              MODE: "adventure"
              SPAWN_PROTECTION: 1
              FORCE_REDOWNLOAD: "true"
              ONLINE_MODE: "false"
              ALLOW_FLIGHT: "true"
              # Logging
              ENABLE_ROLLING_LOGS: "false"
              LOG_TIMESTAMP: "true"
              # Performance
              JVM_XX_OPTS: -XX:MaxRAMPercentage=75
              JVM_DD_OPTS: disable.watchdog:true
              # Flat hub with WorldEdit + LuckPerms + voice — heap stays small.
              # JVM overhead pushes RSS to ~1.4× heap, hence the 1536Mi memory
              # limit further down.
              MAX_MEMORY: 1024M
              USE_AIKAR_FLAGS: "true"
              SNOOPER_ENABLED: "false"
              # Flat hub: 14 was wasteful. 8 chunks (~128 blocks) is plenty for
              # a landing/lobby area.
              VIEW_DISTANCE: 8
              ## Mods
              REMOVE_OLD_MODS: "true"
              MODRINTH_DEFAULT_VERSION_TYPE: release
              # unifiedmetrics:Ypqt7eH1 is UnifiedMetrics 0.3.8 (Apr 2023), the
              # latest release on Modrinth — no version tagged for MC 1.21.x
              # exists. Pinning the version ID bypasses itzg's game-version
              # filter. The plugin uses stable Bukkit/Paper APIs (TPS, online
              # players, heap), so it loads on newer Paper versions without
              # NMS breakage. NB: comments inside the |- block are parsed as
              # project slugs by itzg, so they have to live outside it.
              MODRINTH_PROJECTS: |-
                luckperms:OrIs0S6b
                simple-voice-chat
                unifiedmetrics:Ypqt7eH1
                worldedit
              # signedvelocity:TKC72r9l
              # discordsrv
              # PLUGINS: |-
              ENABLE_QUERY: "true"
              EXISTING_OPS_FILE: SYNCHRONIZE
            envFrom:
              - secretRef:
                  name: minecraft-lobby-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: [ALL]
                add: ["NET_RAW"]
            resources:
              requests:
                cpu: 100m
                memory: 768Mi
              limits:
                # No CPU limit: throttling kills MC tick rate. Memory limit
                # leaves ~512Mi headroom over MAX_MEMORY for JVM metaspace,
                # direct buffers, and threads.
                memory: 1536Mi
    service:
      minecraft:
        controller: *app
        type: ClusterIP
        ports:
          java:
            port: 25565
            protocol: TCP
          voice:
            port: 24454
            protocol: UDP
          bedrock:
            port: 19132
            protocol: UDP
          # map:
          #   port: 8100
          rcon:
            port: 25575
          metrics:
            # UnifiedMetrics Prometheus driver listens on 9100 by default.
            port: 9100
    serviceMonitor:
      metrics:
        enabled: true
        serviceName: *app
        endpoints:
          - port: metrics
            scheme: http
            path: /
            interval: 1m
    persistence:
      data:
        existingClaim: *app
      config:
        enabled: true
        type: configMap
        name: minecraft-lobby-configmap
        globalMounts:
          - subPath: luckperms.yml
            path: /plugins/LuckPerms/config.yml
          - subPath: paper-global.yml
            path: /config/paper-global.yml
