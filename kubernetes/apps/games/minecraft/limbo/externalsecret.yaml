---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minecraft-limbo
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: minecraft-limbo-secret
    template:
      data:
        # Renders the entire NanoLimbo settings.yml with the forwarding secret
        # injected. itzg/minecraft-server's TYPE=NANOLIMBO exposes no env vars for
        # forwarding mode/secret — the default settings.yml ships with
        # infoForwarding.type=NONE, so we have to provide the whole file.
        settings.yml: |
          bind:
            ip: '0.0.0.0'
            port: 25565
          maxPlayers: 100
          ping:
            description: '{"text":"Server starting — hang tight"}'
            version: 'NanoLimbo'
            protocol: -1
          dimension: THE_END
          playerList:
            enable: false
            username: 'NanoLimbo'
          headerAndFooter:
            enable: false
          gameMode: 3
          secureProfile: false
          brandName:
            enable: true
            content: 'NanoLimbo'
          joinMessage:
            enable: true
            text: '{"text":"Your server is starting. You will be reconnected automatically."}'
          bossBar:
            enable: true
            text: '{"text":"Waking up your server..."}'
            health: 1.0
            color: BLUE
            division: SOLID
          title:
            enable: false
          infoForwarding:
            type: MODERN
            secret: '{{ .FORWARDING_SECRET }}'
          readTimeout: 30000
          debugLevel: 2
          netty:
            useEpoll: true
            threads:
              bossGroup: 1
              workerGroup: 2
          traffic:
            enable: true
            maxPacketSize: 8192
            interval: 7.0
            maxPacketRate: 500.0
            maxPacketBytesRate: 2048.0
  dataFrom:
    - extract:
        key: minecraft
