---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app minecraft-router
spec:
  interval: 15m
  timeout: 5m
  maxHistory: 3
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false
  values:
    serviceAccount:
      minecraft-router: {}
    rbac:
      roles:
        minecraft-router:
          type: Role
          rules:
            - apiGroups: [""]
              resources: ["services"]
              verbs: ["get", "list", "watch"]
            # mc-router only knows how to scale StatefulSets; per upstream docs the
            # backend's metadata.name must equal its spec.serviceName for scale-up to fire.
            - apiGroups: ["apps"]
              resources: ["statefulsets", "statefulsets/scale"]
              verbs: ["get", "list", "watch", "update", "patch"]
            - apiGroups: [""]
              resources: ["endpoints", "pods"]
              verbs: ["get", "list", "watch"]
      bindings:
        minecraft-router:
          type: RoleBinding
          roleRef:
            identifier: minecraft-router
          subjects:
            - identifier: minecraft-router
    defaultPodOptions:
      # mc-router needs the SA token to talk to the Kubernetes API
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
    controllers:
      mc-router:
        replicas: 1
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: itzg/mc-router
              # renovate: datasource=docker depName=itzg/mc-router
              tag: 1.42.1
            args:
              - --in-kube-cluster
              - --kube-namespace=games
              - --api-binding=:25564
              # Anything that doesn't match an annotated Service falls through to Velocity
              - --default=minecraft-velocity.games.svc.cluster.local:25565
              # Scale-from-zero on StatefulSet when an annotated Service receives a connection
              - --auto-scale-up
              # Scale-to-zero after the connection drains + idle period
              - --auto-scale-down
              # Single global value (mc-router doesn't support per-service overrides).
              # 30m balances "survival stays up much longer than creative" vs not pinning
              # idle creative pods forever. Tune in this one place; the README documents
              # the trade-off.
              - --auto-scale-down-after=30m
              # MOTD shown to status pings while a backend is at replicas: 0. Without
              # this, mc-router does not respond at all and the server appears as
              # "Can't connect to server" in the client's list. With it set, players
              # see a friendly message and know to click connect to wake the backend.
              - --auto-scale-asleep-motd=Server is sleeping — connect to wake it up
            env:
              TZ: "${TIMEZONE}"
              # Temporary while diagnosing why players see "Network Protocol Error"
              # after the edge-LB refactor; revert once the cause is identified.
              DEBUG: "true"
            probes:
              readiness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /routes
                    port: 25564
                  periodSeconds: 30
              liveness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /routes
                    port: 25564
                  failureThreshold: 30
                  periodSeconds: 2
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: [ALL]
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 128Mi
    service:
      # mc-router is the public TCP entrypoint. It reads the handshake hostname,
      # scales the matching backend StatefulSet from 0→1 if needed, then routes the
      # client to Velocity (via the proxyServerName annotation on each backend's
      # Service). Velocity then connects to the now-running backend directly, so
      # Velocity's modern player-info-forwarding handshake reaches the backend
      # intact (mc-router never sits between Velocity and the backend).
      app:
        controller: mc-router
        type: LoadBalancer
        annotations:
          io.cilium/lb-ipam-ips: 10.10.40.150
          io.cilium/lb-ipam-sharing-key: minecraft-frontend
        ports:
          minecraft:
            port: 25565
            protocol: TCP
            targetPort: 25565
      # Admin API kept on its own ClusterIP service — no need to expose it externally.
      api:
        controller: mc-router
        type: ClusterIP
        ports:
          api:
            port: 25564
            protocol: TCP
            targetPort: 25564
