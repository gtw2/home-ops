---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mc-router
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mc-router
rules:
  # mc-router watches Services for the routing annotations
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
  # Scale-from-zero / scale-to-zero on Deployments backing those Services
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale", "statefulsets", "statefulsets/scale"]
    verbs: ["get", "list", "watch", "update", "patch"]
  # Used by mc-router to discover pods behind the Service when routing
  - apiGroups: [""]
    resources: ["endpoints", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mc-router
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mc-router
subjects:
  - kind: ServiceAccount
    name: mc-router
    namespace: games
