---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ocis-restarter
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ocis-restarter
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ocis-restarter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ocis-restarter
subjects:
  - kind: ServiceAccount
    name: ocis-restarter
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ocis-monthly-restart
spec:
  schedule: "0 4 1 * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          serviceAccountName: ocis-restarter
          restartPolicy: OnFailure
          containers:
            - name: kubectl
              image: docker.io/bitnami/kubectl:1.31
              command:
                - kubectl
                - rollout
                - restart
                - deployment/ocis
