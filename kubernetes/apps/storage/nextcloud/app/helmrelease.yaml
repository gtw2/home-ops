---
# yaml-language-server: $schema=https://schemas.vzkn.eu/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: nextcloud
  values:
    podAnnotations:
      reloader.stakater.com/search: "true"
    image:
      flavor: fpm-alpine
    nginx:
      enabled: true
      # type: cronjob
      # cronjob:
      #   successfulJobsHistoryLimit: 1
      #   securityContext:
      #     runAsGroup: 1022
      #     runAsNonRoot: true
      #     runAsUser: 1022
    image:
      flavor: fpm-alpine
    nginx:
      enabled: true
    nextcloud:
      extraInitContainers:
        - name: init-db
          image: ghcr.io/home-operations/postgres-init:18.3@sha256:6fa1f331cddd2eb0b6afa7b8d3685c864127a81ab01c3d9400bc3ff5263a51cf
          envFrom:
            - secretRef:
                name: &secret nextcloud-secret
      host: files.${SECRET_DOMAIN}
      datadir: /var/www/data
      # Security context (UID/GID from Volsync component)
      securityContext:
        runAsUser: 1000
        runAsGroup: 100
        runAsNonRoot: true
      # Admin credentials and SMTP from ExternalSecret
      existingSecret:
        enabled: true
        secretName: *secret
        usernameKey: NEXTCLOUD_ADMIN_USER
        passwordKey: NEXTCLOUD_ADMIN_PASS
      # SMTP configuration
      mail:
        enabled: false
      # Environment variables
      extraEnv:
        # Redis connection (Dragonfly)
        - name: REDIS_HOST
          value: dragonfly.database.svc.cluster.local
        - name: REDIS_HOST_PORT
          value: "6379"
        # OIDC credentials (for PHP config below)
        - name: OIDC_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: *secret
              key: OIDC_CLIENT_ID
        - name: OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: *secret
              key: OIDC_CLIENT_SECRET
      # Volumes for hooks
      # extraVolumes:
      #   - name: hooks
      #     configMap:
      #       name: nextcloud-hooks
      #       defaultMode: 0755
      # extraVolumeMounts:
      #   - name: hooks
      #     mountPath: /docker-entrypoint-hooks.d/before-starting
      # PHP configuration files
      configs:
        # Proxy and trusted domains
        proxy.config.php: |-
          <?php
          $CONFIG = array (
            'trusted_domains' =>
              [
                'nextcloud',
                'files.${SECRET_DOMAIN}',
              ],
            'trusted_proxies' => array(
              0 => '127.0.0.1',
              1 => '10.42.0.0/16',
              2 => '10.43.0.0/16',
            ),
            'forwarded_for_headers' => array('HTTP_X_FORWARDED_FOR'),
          );
        # General settings
        misc.config.php: |-
          <?php
          $CONFIG = array (
            'default_phone_region' => 'PL',
            'maintenance_window_start' => 2,
            'allow_local_remote_servers' => true,
            'overwriteprotocol' => 'https',
            'overwrite.cli.url' => 'https://files.${SECRET_DOMAIN}',
            'filelocking.enabled' => 'true',
            'loglevel' => '2',
            'enable_previews' => true,
            'bulkupload.enabled' => true,
          );
        oidc.config.php: |-
          <?php
          $CONFIG = array (
            'allow_user_to_change_display_name' => false,
            'lost_password_link' => 'disabled',
            'oidc_login_provider_url' => 'https://sso.${SECRET_DOMAIN}/application/o/nextcloud/',
            'oidc_login_client_id' => getenv('OIDC_CLIENT_ID'),
            'oidc_login_client_secret' => getenv('OIDC_CLIENT_SECRET'),
            'oidc_login_auto_redirect' => false,
            'oidc_login_end_session_redirect' => true,
            'oidc_login_button_text' => 'Login with Authentik',
            'oidc_login_hide_password_form' => true,
            'oidc_login_use_id_token' => false,
            'oidc_login_attributes' => array(
              'id' => 'preferred_username',
              'name' => 'name',
              'mail' => 'email',
              'groups' => 'groups',
            ),
            'oidc_login_scope' => 'openid profile email groups',
            'oidc_login_default_group' => 'oidc',
            'oidc_login_use_external_storage' => false,
            'oidc_login_proxy_ldap' => false,
            'oidc_login_disable_registration' => false,
            'oidc_login_redir_fallback' => false,
            'oidc_login_tls_verify' => true,
            'oidc_create_groups' => false,
            'oidc_login_webdav_enabled' => true,
            'oidc_login_password_authentication' => false,
            'oidc_login_public_key_caching_time' => 86400,
            'oidc_login_update_avatar' => false,
          );
      phpConfigs:
        uploadLimit.ini: |
          upload_max_filesize = 100G
          post_max_size = 100G
          max_input_time = 14400
          max_execution_time = 14400
        #  memory_limit = 512M
        # www.conf: |
        #   [www]
        #   user = www-data
        #   group = www-data
        #   listen = 127.0.0.1:9000
        #   pm = dynamic
        #   pm.max_children = 57
        #   pm.start_servers = 14
        #   pm.min_spare_servers = 14
        #   pm.max_spare_servers = 42
        #   pm.max_requests = 500
        #   pm.process_idle_timeout = 10s
    internalDatabase:
      enabled: false
    externalDatabase:
      enabled: true
      type: postgresql
      existingSecret:
        enabled: true
        secretName: *secret
        usernameKey: INIT_POSTGRES_USER
        passwordKey: INIT_POSTGRES_PASS
        hostKey: INIT_POSTGRES_HOST
        databaseKey: INIT_POSTGRES_DBNAME
    persistence:
      enabled: true
      existingClaim: nextcloud
      nextcloudData:
        enabled: true
        existingClaim: nextcloud-nfs
        accessMode: ReadWriteMany
    # this seems to be required for nextcloud initialization which takes a long time
    startupProbe:
      enabled: true
      initialDelaySeconds: 10
      periodSeconds: 20
      timeoutSeconds: 5
      failureThreshold: 30
      successThreshold: 1